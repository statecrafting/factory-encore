# Spec: 007-generator-e2e-harness
#
# Generator e2e -- structural PR gate (FR-004). Drives the acme-vue-encore
# generator against a template-encore checkout across the full profile x module
# matrix (22 produced apps) and runs structural-only assertions (no build). This
# is Node + tsx only -- the generator skips npm install / encore gen client under
# --no-install -- so it is cheap enough to gate every generator-touching PR.
#
# Routed on the generator surface from ci.yml (the same changed-path filter that
# gates generator-ci) and folded into the terminal ci-gate, so it is a required
# check. The expensive build matrix stays nightly (generator-e2e-nightly.yml).
# The baseline is fetched at the lockstep pinned ref so the structural gate is
# deterministic; a fetch failure fails the job (fail-visible, never
# skipped-green). All uses: are SHA-pinned to the same refs the rest of the repo
# uses.

name: generator-e2e

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  structural:
    runs-on: ubuntu-latest
    name: generator-e2e / structural matrix (no build)
    timeout-minutes: 20
    env:
      LOCKFILE: adapters/acme-vue-encore/scripts/lockstep/baseline.lock.json
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read the pinned baseline ref + remote
        id: pin
        run: |
          set -euo pipefail
          ref="$(node -p "require('./${LOCKFILE}').pinnedRef")"
          src="$(node -p "require('./${LOCKFILE}').upstreamSource")"
          if [ -z "$ref" ] || [ -z "$src" ]; then
            echo "::error::could not read pinnedRef/upstreamSource from ${LOCKFILE}"
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "src=$src" >> "$GITHUB_OUTPUT"
          echo "pinned baseline: $src @ $ref"

      - name: Fetch template-encore baseline at the pinned ref (full tree)
        run: |
          set -euo pipefail
          rm -rf .baseline
          mkdir .baseline
          cd .baseline
          git init -q
          git remote add origin "https://${{ steps.pin.outputs.src }}.git"
          if ! git fetch --depth 1 origin "${{ steps.pin.outputs.ref }}" 2> fetch.err; then
            cat fetch.err >&2
            echo "::error::cannot fetch template-encore at the pinned ref; the e2e gate is fail-visible, never skipped-green"
            exit 1
          fi
          git checkout -q FETCH_HEAD
          test -d apps || { echo "::error::baseline apps/ absent at the pinned ref"; exit 1; }

      - name: Structural matrix (no build)
        env:
          TEMPLATE_ENCORE: ${{ github.workspace }}/.baseline
        run: npm run e2e:struct
