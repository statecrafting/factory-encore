# Spec: 000-factory-kernel
#
# The generator test gate: typecheck the deterministic acme-vue-encore
# generator and run its unit + integration tests (including the lockstep unit
# tests). Routed on the generator surface from ci.yml and folded into the
# terminal ci-gate so it is a required check.

name: generator-ci

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generator:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck the generator
        run: npm run typecheck

      - name: Generator unit + integration tests
        run: npm test
